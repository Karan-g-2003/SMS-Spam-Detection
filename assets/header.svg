<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <style>
      @keyframes float1 {
        0%, 100% { transform: translate(0px, 0px); }
        50% { transform: translate(20px, -15px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0px, 0px); }
        50% { transform: translate(-15px, 20px); }
      }
      @keyframes float3 {
        0%, 100% { transform: translate(0px, 0px); }
        50% { transform: translate(10px, 10px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      @keyframes slideIn {
        0% { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes dash {
        to { stroke-dashoffset: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .orb1 { animation: float1 8s ease-in-out infinite; }
      .orb2 { animation: float2 10s ease-in-out infinite; }
      .orb3 { animation: float3 6s ease-in-out infinite; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .title { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
      .particle { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="url(#bg)"/>

  <!-- Animated orbs -->
  <circle class="orb1" cx="150" cy="100" r="120" fill="#7b2ff7" opacity="0.12" filter="url(#blur1)"/>
  <circle class="orb2" cx="750" cy="220" r="100" fill="#00d2ff" opacity="0.12" filter="url(#blur1)"/>
  <circle class="orb3" cx="450" cy="280" r="80" fill="#3a1c71" opacity="0.15" filter="url(#blur2)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="420" y1="0" x2="420" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="660" y1="0" x2="660" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="780" y1="0" x2="780" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="900" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="900" y2="60" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Floating particles -->
  <circle class="particle" cx="100" cy="50" r="2" fill="#00d2ff" opacity="0.6" style="animation-delay: 0s"/>
  <circle class="particle" cx="250" cy="30" r="1.5" fill="#7b2ff7" opacity="0.5" style="animation-delay: 0.5s"/>
  <circle class="particle" cx="400" cy="70" r="2.5" fill="#00d2ff" opacity="0.4" style="animation-delay: 1s"/>
  <circle class="particle" cx="600" cy="40" r="1.8" fill="#fff" opacity="0.3" style="animation-delay: 1.5s"/>
  <circle class="particle" cx="780" cy="60" r="2" fill="#7b2ff7" opacity="0.5" style="animation-delay: 0.3s"/>
  <circle class="particle" cx="850" cy="120" r="1.5" fill="#00d2ff" opacity="0.4" style="animation-delay: 0.8s"/>
  <circle class="particle" cx="50" cy="200" r="2" fill="#fff" opacity="0.2" style="animation-delay: 1.2s"/>
  <circle class="particle" cx="300" cy="280" r="1.8" fill="#7b2ff7" opacity="0.3" style="animation-delay: 0.6s"/>
  <circle class="particle" cx="700" cy="290" r="2.2" fill="#00d2ff" opacity="0.4" style="animation-delay: 1.8s"/>

  <!-- Shield / Envelope icon -->
  <g transform="translate(350, 65)">
    <!-- Shield shape -->
    <path d="M100 0 L190 35 L190 105 C190 155 150 190 100 210 C50 190 10 155 10 105 L10 35 Z"
          fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <path d="M100 10 L180 42 L180 105 C180 150 145 180 100 198 C55 180 20 150 20 105 L20 42 Z"
          fill="url(#bg)" opacity="0.6"/>

    <!-- Envelope inside shield -->
    <g transform="translate(50, 65)">
      <rect x="10" y="15" width="80" height="55" rx="5" fill="none" stroke="url(#accent)" stroke-width="1.8"/>
      <polyline points="10,15 50,45 90,15" fill="none" stroke="url(#accent)" stroke-width="1.8"/>
      <line x1="10" y1="70" x2="35" y2="48" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
      <line x1="90" y1="70" x2="65" y2="48" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>

      <!-- X mark for spam -->
      <g transform="translate(58, 25)" opacity="0.85">
        <line x1="0" y1="0" x2="18" y2="18" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="18" y1="0" x2="0" y2="18" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round"/>
      </g>

      <!-- Check mark for ham -->
      <g transform="translate(18, 28)" opacity="0.85">
        <polyline points="0,8 5,14 16,2" fill="none" stroke="#2ed573" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <!-- Title -->
  <text x="450" y="215" text-anchor="middle" class="title" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="1">
    SMS Spam Detection
  </text>

  <!-- Glow behind title -->
  <text x="450" y="215" text-anchor="middle" class="title" font-size="34" font-weight="700" fill="url(#accent)" opacity="0.4" filter="url(#textGlow)" letter-spacing="1">
    SMS Spam Detection
  </text>

  <!-- Subtitle -->
  <text x="450" y="248" text-anchor="middle" class="title" font-size="15" fill="#a0a0b8" letter-spacing="2">
    Intelligent Spam Classification with Machine Learning
  </text>

  <!-- Accent line -->
  <rect x="350" y="265" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Bottom tags -->
  <g transform="translate(280, 283)">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="#7b2ff7" opacity="0.2"/>
    <text x="40" y="15" text-anchor="middle" class="title" font-size="10" fill="#b794f6">scikit-learn</text>

    <rect x="95" y="0" width="55" height="22" rx="11" fill="#00d2ff" opacity="0.2"/>
    <text x="122" y="15" text-anchor="middle" class="title" font-size="10" fill="#67e8f9">NLP</text>

    <rect x="165" y="0" width="100" height="22" rx="11" fill="#7b2ff7" opacity="0.2"/>
    <text x="215" y="15" text-anchor="middle" class="title" font-size="10" fill="#b794f6">Python 3.x</text>
  </g>
</svg>
