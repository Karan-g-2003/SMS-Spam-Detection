<svg xmlns="http://www.w3.org/2000/svg" width="900" height="100" viewBox="0 0 900 100">
  <defs>
    <linearGradient id="footBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="footAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <style>
      .footer-text { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.8; }
      }
      .star { animation: twinkle 3s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="900" height="100" rx="12" fill="url(#footBg)"/>

  <!-- Stars -->
  <circle class="star" cx="80" cy="25" r="1" fill="#fff" style="animation-delay: 0s"/>
  <circle class="star" cx="200" cy="15" r="1.2" fill="#00d2ff" style="animation-delay: 0.5s"/>
  <circle class="star" cx="350" cy="30" r="0.8" fill="#fff" style="animation-delay: 1s"/>
  <circle class="star" cx="550" cy="20" r="1" fill="#7b2ff7" style="animation-delay: 1.5s"/>
  <circle class="star" cx="700" cy="28" r="1.3" fill="#00d2ff" style="animation-delay: 0.3s"/>
  <circle class="star" cx="820" cy="18" r="0.9" fill="#fff" style="animation-delay: 0.8s"/>

  <!-- Top accent line -->
  <rect x="100" y="8" width="700" height="1.5" rx="0.75" fill="url(#footAccent)" opacity="0.3"/>

  <!-- Main text -->
  <text x="450" y="52" text-anchor="middle" class="footer-text" font-size="14" fill="#a0a0b8" letter-spacing="1">
    Built with 💜 by
    <tspan fill="#b794f6" font-weight="600"> Karan Gupta</tspan>
  </text>

  <!-- Sub text -->
  <text x="450" y="74" text-anchor="middle" class="footer-text" font-size="11" fill="#6e6e8a" letter-spacing="1">
    If this helped you, consider giving it a ⭐
  </text>

  <!-- Bottom accent line -->
  <rect x="350" y="88" width="200" height="1" rx="0.5" fill="url(#footAccent)" opacity="0.4"/>
</svg>
