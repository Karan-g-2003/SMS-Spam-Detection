<svg xmlns="http://www.w3.org/2000/svg" width="900" height="95" viewBox="0 0 900 95">
  <defs>
    <linearGradient id="techBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <style>
      .tech-name { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11px; fill: #c9d1d9; font-weight: 600; }
      .tech-icon { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 26px; }
      @keyframes gentleHover {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      .tech-card:hover { filter: brightness(1.2); }
    </style>
  </defs>

  <rect width="900" height="95" rx="12" fill="url(#techBg)"/>

  <!-- Python -->
  <g class="tech-card" transform="translate(40, 15)">
    <rect width="110" height="65" rx="10" fill="#1a2332" stroke="#3572A5" stroke-width="1.2" opacity="0.8"/>
    <text x="55" y="32" text-anchor="middle" class="tech-icon">🐍</text>
    <text x="55" y="52" text-anchor="middle" class="tech-name">Python</text>
  </g>

  <!-- Scikit-learn -->
  <g class="tech-card" transform="translate(170, 15)">
    <rect width="110" height="65" rx="10" fill="#1e2a1e" stroke="#F89939" stroke-width="1.2" opacity="0.8"/>
    <text x="55" y="32" text-anchor="middle" class="tech-icon">🔬</text>
    <text x="55" y="52" text-anchor="middle" class="tech-name">Scikit-learn</text>
  </g>

  <!-- NLTK -->
  <g class="tech-card" transform="translate(300, 15)">
    <rect width="110" height="65" rx="10" fill="#1a2332" stroke="#154f5b" stroke-width="1.2" opacity="0.8"/>
    <text x="55" y="32" text-anchor="middle" class="tech-icon">📝</text>
    <text x="55" y="52" text-anchor="middle" class="tech-name">NLTK</text>
  </g>

  <!-- Pandas -->
  <g class="tech-card" transform="translate(430, 15)">
    <rect width="110" height="65" rx="10" fill="#1a1a2e" stroke="#150458" stroke-width="1.2" opacity="0.8"/>
    <text x="55" y="32" text-anchor="middle" class="tech-icon">🐼</text>
    <text x="55" y="52" text-anchor="middle" class="tech-name">Pandas</text>
  </g>

  <!-- NumPy -->
  <g class="tech-card" transform="translate(560, 15)">
    <rect width="110" height="65" rx="10" fill="#1a2332" stroke="#4d77cf" stroke-width="1.2" opacity="0.8"/>
    <text x="55" y="32" text-anchor="middle" class="tech-icon">🔢</text>
    <text x="55" y="52" text-anchor="middle" class="tech-name">NumPy</text>
  </g>

  <!-- Matplotlib -->
  <g class="tech-card" transform="translate(690, 15)">
    <rect width="110" height="65" rx="10" fill="#2a1a1a" stroke="#11557c" stroke-width="1.2" opacity="0.8"/>
    <text x="55" y="32" text-anchor="middle" class="tech-icon">📊</text>
    <text x="55" y="52" text-anchor="middle" class="tech-name">Matplotlib</text>
  </g>

  <!-- Jupyter -->
  <g class="tech-card" transform="translate(820, 15)">
    <rect width="55" height="65" rx="10" fill="#2a2017" stroke="#F37626" stroke-width="1.2" opacity="0.8"/>
    <text x="27.5" y="32" text-anchor="middle" class="tech-icon">📓</text>
    <text x="27.5" y="52" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" fill="#c9d1d9" font-weight="600">JN</text>
  </g>
</svg>
