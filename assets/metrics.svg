<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="metricBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#5a1fd4"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ed573"/>
      <stop offset="100%" style="stop-color:#1ea85c"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b81"/>
      <stop offset="100%" style="stop-color:#ee5a6f"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="50%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#2ed573"/>
    </linearGradient>
    <style>
      .metric-label { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; fill: #8b949e; font-weight: 500; }
      .metric-value { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; fill: #e6edf3; font-weight: 700; }
      .metric-title { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; fill: #58a6ff; font-weight: 600; letter-spacing: 3px; }
      .ring-text { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 28px; fill: #ffffff; font-weight: 700; }
      .ring-label { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 10px; fill: #8b949e; }
      @keyframes fillBar1 { from { width: 0; } to { width: 291; } }
      @keyframes fillBar2 { from { width: 0; } to { width: 285; } }
      @keyframes fillBar3 { from { width: 0; } to { width: 288; } }
      @keyframes fillBar4 { from { width: 0; } to { width: 294; } }
      @keyframes ringDraw {
        from { stroke-dashoffset: 283; }
        to { stroke-dashoffset: 8.5; }
      }
      .ring-progress {
        animation: ringDraw 2s ease-out forwards;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="metric-title">MODEL PERFORMANCE</text>
  <rect x="355" y="38" width="190" height="1" rx="0.5" fill="url(#ringGrad)" opacity="0.4"/>

  <!-- Accuracy ring (left side) -->
  <g transform="translate(130, 130)">
    <!-- Background ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#21262d" stroke-width="10"/>
    <!-- Progress ring -->
    <circle class="ring-progress" cx="0" cy="0" r="55" fill="none" stroke="url(#ringGrad)" stroke-width="10"
            stroke-dasharray="283" stroke-dashoffset="8.5"
            stroke-linecap="round" transform="rotate(-90)"/>
    <!-- Inner glow -->
    <circle cx="0" cy="0" r="42" fill="#0d1117"/>
    <circle cx="0" cy="0" r="42" fill="#58a6ff" opacity="0.03"/>
    <!-- Text -->
    <text x="0" y="5" text-anchor="middle" class="ring-text">97<tspan font-size="16">%</tspan></text>
    <text x="0" y="22" text-anchor="middle" class="ring-label">ACCURACY</text>
  </g>

  <!-- Metric bars (right side) -->
  <g transform="translate(280, 58)">
    <!-- Precision -->
    <text x="0" y="12" class="metric-label">Precision</text>
    <rect x="100" y="0" width="300" height="18" rx="9" fill="#21262d"/>
    <rect x="100" y="0" width="291" height="18" rx="9" fill="url(#bar1)" opacity="0.85">
      <animate attributeName="width" from="0" to="291" dur="1.5s" fill="freeze"/>
    </rect>
    <text x="540" y="13" class="metric-value">97.0%</text>

    <!-- Recall -->
    <text x="0" y="52" class="metric-label">Recall</text>
    <rect x="100" y="40" width="300" height="18" rx="9" fill="#21262d"/>
    <rect x="100" y="40" width="285" height="18" rx="9" fill="url(#bar2)" opacity="0.85">
      <animate attributeName="width" from="0" to="285" dur="1.5s" fill="freeze"/>
    </rect>
    <text x="540" y="53" class="metric-value">95.0%</text>

    <!-- F1-Score -->
    <text x="0" y="92" class="metric-label">F1-Score</text>
    <rect x="100" y="80" width="300" height="18" rx="9" fill="#21262d"/>
    <rect x="100" y="80" width="288" height="18" rx="9" fill="url(#bar3)" opacity="0.85">
      <animate attributeName="width" from="0" to="288" dur="1.5s" fill="freeze"/>
    </rect>
    <text x="540" y="93" class="metric-value">96.0%</text>

    <!-- AUC-ROC -->
    <text x="0" y="132" class="metric-label">AUC-ROC</text>
    <rect x="100" y="120" width="300" height="18" rx="9" fill="#21262d"/>
    <rect x="100" y="120" width="294" height="18" rx="9" fill="url(#bar4)" opacity="0.85">
      <animate attributeName="width" from="0" to="294" dur="1.5s" fill="freeze"/>
    </rect>
    <text x="540" y="133" class="metric-value">98.0%</text>
  </g>

  <!-- Bottom line -->
  <rect x="30" y="205" width="840" height="1" rx="0.5" fill="url(#ringGrad)" opacity="0.15"/>
</svg>
